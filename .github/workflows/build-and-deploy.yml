name: Deploy Dashboard

# Match data lives outside this repo (../Data Organization And Cleaning/),
# so CI cannot rebuild the dashboard. Rebuild locally with build_dashboard.py,
# commit the regenerated HTML, and push — this workflow publishes it to Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp Courage_Team_Performance_Dashboard.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
